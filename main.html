<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>VSL Bundle Generator</title>

<style>
body{
    font-family:Arial,sans-serif;
    padding:30px;
    background:#f5f7fa;
}

h1{
    color:#0f4fa8;
}

button{
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#0f4fa8;
    color:white;
}

button:hover{
    background:#0b3d85;
}

pre{
    background:white;
    padding:15px;
    border-radius:8px;
    border:1px solid #ddd;
    max-height:500px;
    overflow:auto;
}

</style>
</head>
<body>

<h1>Bundle Completo Progetto</h1>

<p>
Seleziona la cartella principale del progetto.
Il sistema leggerà tutti i file e produrrà uno o più TXT.
</p>

<input type="file" id="folder" webkitdirectory directory multiple>

<br><br>

<button id="startBtn">
Genera Bundle
</button>

<pre id="log"></pre>

<script>

const MAX_FILE_SIZE = 8 * 1024 * 1024;

const EXCLUDED_FOLDERS = [
    "node_modules",
    ".git",
    "dist",
    "build",
    ".next",
    ".vercel",
    "coverage"
];

const EXCLUDED_EXTENSIONS = [
    ".png",
    ".jpg",
    ".jpeg",
    ".gif",
    ".webp",
    ".mp4",
    ".avi",
    ".mov",
    ".zip",
    ".rar",
    ".7z",
    ".pdf",
    ".xlsx",
    ".xls",
    ".pptx",
    ".docx"
];

const log = document.getElementById("log");

function writeLog(text){
    log.textContent += text + "\n";
}

function shouldSkip(path){

    const lower = path.toLowerCase();

    for(const folder of EXCLUDED_FOLDERS){
        if(lower.includes("/" + folder.toLowerCase() + "/")){
            return true;
        }
    }

    for(const ext of EXCLUDED_EXTENSIONS){
        if(lower.endsWith(ext)){
            return true;
        }
    }

    return false;
}

async function readFileContent(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.onload = () => resolve(reader.result);

        reader.onerror = reject;

        reader.readAsText(file);

    });

}

function download(name,content){

    const blob = new Blob(
        [content],
        {type:"text/plain;charset=utf-8"}
    );

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = name;

    a.click();

    URL.revokeObjectURL(a.href);

}

document.getElementById("startBtn").addEventListener("click", async()=>{

    const files = [...document.getElementById("folder").files];

    if(!files.length){
        alert("Seleziona una cartella");
        return;
    }

    log.textContent = "";

    writeLog("Analisi progetto...");

    let parts = [];
    let currentBundle = "";
    let currentSize = 0;
    let bundleNumber = 1;

    let includedFiles = 0;

    for(const file of files){

        const path = file.webkitRelativePath;

        if(shouldSkip(path)){
            continue;
        }

        try{

            const content = await readFileContent(file);

            const section =
`
====================================================
FILE: ${path}
====================================================

${content}



`;

            const sectionSize =
                new TextEncoder().encode(section).length;

            if(
                currentSize + sectionSize >
                MAX_FILE_SIZE
            ){

                parts.push(currentBundle);

                currentBundle = "";
                currentSize = 0;

                bundleNumber++;

            }

            currentBundle += section;
            currentSize += sectionSize;

            includedFiles++;

            writeLog("OK " + path);

        }
        catch(err){

            writeLog(
                "ERRORE " + path
            );

        }

    }

    if(currentBundle){
        parts.push(currentBundle);
    }

    writeLog("");
    writeLog(
        "File inclusi: " + includedFiles
    );

    writeLog(
        "Bundle generati: " + parts.length
    );

    parts.forEach((bundle,index)=>{

        const name =
            `bundle_part_${String(index+1).padStart(3,"0")}.txt`;

        download(name,bundle);

    });

    writeLog("");
    writeLog("COMPLETATO");

});

</script>

</body>
</html>
